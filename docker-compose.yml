version: "3.9"

services:
  # Redis — message broker & cache
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Django Backend API
  backend:
    build: ./backend
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SCANNER_SERVICE_URL=http://scanner:8001
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - backend_data:/app/db
      - backend_static:/app/staticfiles
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 4 --worker-class gthread --timeout 900"

  # Celery Worker
  celery:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SCANNER_SERVICE_URL=http://scanner:8001
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - backend_data:/app/db
    command: celery -A config worker -l info --concurrency=4 -Q celery,default,reputation

  # Celery Beat — periodic task scheduler
  celery-beat:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SCANNER_SERVICE_URL=http://scanner:8001
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - backend_data:/app/db
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # Scanner Service
  scanner:
    build: ./scanner
    restart: always
    shm_size: '2gb'
    ports:
      - "127.0.0.1:8001:8001"
      - "0.0.0.0:6080:6080"
    volumes:
      - scanner_logs:/app/logs
    command: uvicorn main:app --host 0.0.0.0 --port 8001

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_INTERNAL_URL: http://backend:8000
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - BACKEND_INTERNAL_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  redis_data:
  backend_data:
  backend_static:
  scanner_logs:
