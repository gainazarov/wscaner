services:
  # Redis — message broker & cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Django Backend API
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SCANNER_SERVICE_URL=http://scanner:8001
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 4 --worker-class gthread --timeout 900 --reload"

  # Celery Worker
  celery:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SCANNER_SERVICE_URL=http://scanner:8001
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./backend:/app
    command: celery -A config worker -l info --concurrency=4 -Q celery,default,reputation

  # Celery Beat — periodic task scheduler
  celery-beat:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SCANNER_SERVICE_URL=http://scanner:8001
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./backend:/app
    command: >-
      sh -c "echo 'Waiting for migrations...';
             sleep 10;
             python manage.py migrate --noinput 2>/dev/null;
             celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"

  # Scanner Service
  scanner:
    build: ./scanner
    shm_size: '2gb'
    ports:
      - "8001:8001"
      - "6080:6080"
    volumes:
      - ./scanner:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  # Next.js Frontend
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    command: npm run dev

volumes:
  redis_data:
